<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no" />
  <meta name="theme-color" content="#1a1a2e" />
  <meta name="description" content="Crisalida – Your AI Companion" />
  <link rel="manifest" href="/manifest.json" />
  <link rel="icon" href="/public/icon-192.png" />
  <title>Crisalida</title>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --bg: #1a1a2e;
      --surface: #16213e;
      --primary: #0f3460;
      --accent: #e94560;
      --text: #eaeaea;
      --text-muted: #8892a4;
      --radius: 12px;
    }

    body {
      font-family: 'Segoe UI', system-ui, sans-serif;
      background: var(--bg);
      color: var(--text);
      min-height: 100dvh;
      overflow: hidden;
    }

    #app {
      display: flex;
      flex-direction: column;
      height: 100dvh;
    }

    #view-container {
      flex: 1;
      overflow-y: auto;
      overflow-x: hidden;
    }

    #canvas-container {
      position: fixed;
      inset: 0;
      z-index: 0;
      pointer-events: none;
    }

    #canvas-container canvas {
      width: 100%;
      height: 100%;
    }

    nav#bottom-nav {
      position: fixed;
      bottom: 0;
      left: 0;
      right: 0;
      z-index: 100;
      display: flex;
      justify-content: space-around;
      align-items: center;
      background: rgba(22,33,62,0.95);
      backdrop-filter: blur(12px);
      border-top: 1px solid rgba(255,255,255,0.08);
      padding: 8px 0 max(8px, env(safe-area-inset-bottom));
      height: 64px;
    }

    nav#bottom-nav button {
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 2px;
      background: none;
      border: none;
      color: var(--text-muted);
      cursor: pointer;
      padding: 4px 12px;
      border-radius: 8px;
      transition: color 0.2s, background 0.2s;
      font-size: 10px;
    }

    nav#bottom-nav button.active,
    nav#bottom-nav button:hover {
      color: var(--accent);
    }

    nav#bottom-nav button span.icon {
      font-size: 22px;
      line-height: 1;
    }

    #status-bar {
      position: fixed;
      top: 0;
      left: 0;
      right: 0;
      z-index: 50;
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 8px 16px;
      background: rgba(26,26,46,0.8);
      backdrop-filter: blur(8px);
      font-size: 13px;
      height: 48px;
    }

    .stat-pill {
      display: flex;
      align-items: center;
      gap: 4px;
      font-size: 11px;
      background: rgba(255,255,255,0.06);
      border-radius: 20px;
      padding: 3px 8px;
    }

    .stat-pill .bar {
      width: 32px;
      height: 4px;
      border-radius: 2px;
      background: rgba(255,255,255,0.15);
      overflow: hidden;
    }

    .stat-pill .bar-fill {
      height: 100%;
      border-radius: 2px;
      transition: width 0.5s ease;
    }

    #loading {
      position: fixed;
      inset: 0;
      z-index: 9999;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      background: var(--bg);
      gap: 16px;
    }

    #loading h1 {
      font-size: 2rem;
      background: linear-gradient(135deg, #e94560, #0f3460);
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
    }

    .spinner {
      width: 40px; height: 40px;
      border: 3px solid rgba(233,69,96,0.2);
      border-top-color: #e94560;
      border-radius: 50%;
      animation: spin 0.8s linear infinite;
    }

    @keyframes spin { to { transform: rotate(360deg); } }

    #toast-container {
      position: fixed;
      top: 56px;
      right: 12px;
      z-index: 200;
      display: flex;
      flex-direction: column;
      gap: 8px;
    }

    .toast {
      background: var(--surface);
      border: 1px solid rgba(255,255,255,0.1);
      border-radius: 8px;
      padding: 10px 16px;
      font-size: 13px;
      max-width: 260px;
      animation: slide-in 0.3s ease;
    }

    .toast.success { border-color: #4ade80; }
    .toast.error   { border-color: var(--accent); }

    @keyframes slide-in {
      from { transform: translateX(100%); opacity: 0; }
      to   { transform: translateX(0);    opacity: 1; }
    }
  </style>
</head>
<body>
  <div id="loading">
    <h1>🦋 Crisalida</h1>
    <div class="spinner"></div>
  </div>

  <div id="app" style="display:none">
    <div id="status-bar">
      <span id="agent-name">—</span>
      <div style="display:flex;gap:6px" id="stat-pills"></div>
      <span id="coins-display">🪙 0</span>
    </div>

    <div id="canvas-container"></div>
    <div id="view-container"></div>

    <nav id="bottom-nav">
      <button data-route="home"     class="active"><span class="icon">🏠</span>Home</button>
      <button data-route="chat">    <span class="icon">💬</span>Chat</button>
      <button data-route="care">    <span class="icon">❤️</span>Care</button>
      <button data-route="store">   <span class="icon">🛍️</span>Store</button>
      <button data-route="settings"><span class="icon">⚙️</span>Settings</button>
    </nav>
  </div>

  <div id="toast-container"></div>

  <script type="module" src="/src/core/app.js"></script>
</body>
</html>
